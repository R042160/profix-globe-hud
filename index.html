<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL INTELLIGENCE // ZURICH NODE</title>
    <style>
        :root {
            --bg-color: #05060a;
            --primary-cyan: #00F2FF;
            --primary-gold: #FFD600;
            --alert-red: #FF003C;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-cyan);
            font-family: var(--font-mono);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            transition: background-color 0.5s ease;
        }

        /* GLOBE CONTAINER */
        #globe-viz {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: move;
        }

        /* HUD OVERLAY */
        #hud-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none; /* Let clicks pass through to globe */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* MINIMAL STATE */
        body.minimal #hud-layer {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* HUD PANELS */
        .hud-panel {
            background: rgba(5, 6, 10, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 1rem;
            position: relative;
            width: fit-content;
            max-width: 300px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        /* SCANNER CORNERS */
        .hud-panel::before, .hud-panel::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: var(--primary-cyan);
            border-style: solid;
            transition: all 0.3s ease;
        }

        .hud-panel::before {
            top: -1px; left: -1px;
            border-width: 2px 0 0 2px;
        }
        .hud-panel::after {
            bottom: -1px; right: -1px;
            border-width: 0 2px 2px 0;
        }

        .hud-panel:hover {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* TYPOGRAPHY & DATA */
        h1 {
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: var(--primary-gold);
            text-transform: uppercase;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 0.25rem;
            letter-spacing: 1px;
        }

        .data-label { opacity: 0.7; }
        .data-value { font-weight: bold; }

        /* MARCHING ANTS VOLTAGE */
        .voltage-container {
            margin-top: 0.5rem;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .voltage-bar {
            height: 100%;
            width: 100%;
            background: repeating-linear-gradient(
                90deg,
                var(--primary-cyan),
                var(--primary-cyan) 10px,
                transparent 10px,
                transparent 20px
            );
            background-size: 200% 100%;
            animation: march 2s linear infinite;
        }
        @keyframes march {
            0% { background-position: 100% 0; }
            100% { background-position: 0 0; }
        }

        /* BLINKING CURSOR */
        .blink { animation: blinker 1s step-end infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* TOGGLE BUTTON */
        #toggle-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 200;
            background: rgba(5, 6, 10, 0.8);
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 0.5rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        #toggle-btn:hover {
            background: var(--primary-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary-cyan);
        }

        /* LAYOUT UTILS */
        .top-left { position: absolute; top: 2rem; left: 2rem; }
        .bottom-left { position: absolute; bottom: 2rem; left: 2rem; }
        .bottom-right { position: absolute; bottom: 2rem; right: 2rem; text-align: right; }

        /* LOADING OVERLAY */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s ease;
        }
        .loader-text {
            color: var(--primary-cyan);
            letter-spacing: 4px;
            font-size: 0.8rem;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

    </style>
</head>

    <!-- SCRIPTS -->

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            colors: {
                bg: '#05060a',
                cyan: '#00F2FF',
                gold: '#FFD600',
                red: '#FF003C'
            },
            globe: {
                autoRotateSpeed: 0.45,
                atmColor: '#00F2FF',
                atmAlt: 0.18
            }
        };

        // --- DATA: CITIES ---
        const cities = [
            { name: "Zürich", lat: 47.37, lng: 8.54 },
            { name: "London", lat: 51.50, lng: -0.12 },
            { name: "New York", lat: 40.71, lng: -74.00 },
            { name: "Tokyo", lat: 35.67, lng: 139.65 },
            { name: "Singapore", lat: 1.35, lng: 103.81 },
            { name: "Dubai", lat: 25.20, lng: 55.27 },
            { name: "Sao Paulo", lat: -23.55, lng: -46.63 },
            { name: "Frankfurt", lat: 50.11, lng: 8.68 },
            { name: "Hong Kong", lat: 22.31, lng: 114.16 },
            { name: "Sydney", lat: -33.86, lng: 151.20 },
            { name: "Los Angeles", lat: 34.05, lng: -118.24 },
            { name: "Cape Town", lat: -33.92, lng: 18.42 },
            { name: "Moscow", lat: 55.75, lng: 37.61 },
            { name: "Mumbai", lat: 19.07, lng: 72.87 }
        ];

        // --- DATA: ARCS (Connections) ---
        // Generate arcs: Zürich connects to all, plus some random cross-connections
        const arcs = [];
        const zurich = cities.find(c => c.name === "Zürich");

        // Hub connections (Zürich -> Others)
        cities.forEach(city => {
            if (city.name !== "Zürich") {
                arcs.push({ start: zurich, end: city });
            }
        });

        // Add some random cross-connections for visual density
        const extraConnections = [
            ["London", "New York"], ["Tokyo", "Singapore"], ["Dubai", "Mumbai"],
            ["Sydney", "Tokyo"], ["Sao Paulo", "New York"], ["Hong Kong", "Singapore"]
        ];
        
        extraConnections.forEach(pair => {
            const startCity = cities.find(c => c.name === pair[0]);
            const endCity = cities.find(c => c.name === pair[1]);
            if (startCity && endCity) arcs.push({ start: startCity, end: endCity });
        });

        // --- INIT GLOBE ---
        const world = document.getElementById('globe-viz');
        const globe = Globe()(world)
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor(CONFIG.colors.bg)
            .showAtmosphere(true)
            .atmosphereColor(CONFIG.colors.cyan)
            .atmosphereAltitude(CONFIG.globe.atmAlt)
            .pointsData(cities)
            .pointColor(d => d.name === 'Zürich' ? CONFIG.colors.gold : CONFIG.colors.cyan)
            .pointAltitude(0.02)
            .pointRadius(d => d.name === 'Zürich' ? 0.6 : 0.35)
            .pointLabel(d => d.name)
            .arcsData(arcs)
            .arcStartLat(d => d.start.lat).arcStartLng(d => d.start.lng)
            .arcEndLat(d => d.end.lat).arcEndLng(d => d.end.lng)
            .arcColor(() => [CONFIG.colors.cyan, CONFIG.colors.gold])
            .arcDashLength(0.4)
            .arcDashGap(0.2)
            .arcDashAnimateTime(2200)
            .arcStroke(0.5)
            .arcAltitude(0.25)
            .ringsData([{ lat: 47.37, lng: 8.54 }])
            .ringColor(() => CONFIG.colors.gold)
            .ringMaxRadius(5)
            .ringPropagationSpeed(2)
            .ringRepeatPeriod(900);

        // Controls
        globe.controls().autoRotate = true;
        globe.controls().autoRotateSpeed = CONFIG.globe.autoRotateSpeed;
        globe.controls().enableZoom = true;

        // Resize handler
        window.addEventListener('resize', () => {
            globe.width(window.innerWidth);
            globe.height(window.innerHeight);
        });

        // Remove loader when ready
        globe.onGlobeReady(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 800);
        });

        // --- TELEMETRY SIMULATION ---
        const TelemetryState = {
            power: 89,
            voltage: 450.0,
            speed: 1670,
            temp: 14.2,
            ping: 12
        };

        const els = {
            power: document.getElementById('power-val'),
            voltageText: document.getElementById('voltage-text'),
            voltageBar: document.getElementById('voltage-bar'),
            speed: document.getElementById('speed-val'),
            temp: document.getElementById('temp-val'),
            ping: document.getElementById('ping-val')
        };

        function updateTelemetry() {
            // Random fluctuations
            if (Math.random() > 0.5) {
                TelemetryState.power = Math.min(100, Math.max(85, TelemetryState.power + (Math.random() - 0.5)));
                els.power.innerText = TelemetryState.power.toFixed(1) + '%';
                
                TelemetryState.voltage = Math.max(400, Math.min(480, TelemetryState.voltage + (Math.random() - 0.5) * 5));
                els.voltageText.innerText = TelemetryState.voltage.toFixed(1) + ' kV';
                
                // Adjust bar speed based on voltage
                const speed = 0.5 + ((TelemetryState.voltage - 400) / 80) * 1.5;
                els.voltageBar.style.animationDuration = `${2.1 - speed}s`;
            }

            if (Math.random() > 0.7) {
                TelemetryState.temp = Math.max(10, Math.min(20, TelemetryState.temp + (Math.random() - 0.5) * 0.1));
                els.temp.innerText = TelemetryState.temp.toFixed(1) + ' °C';
            }

            if (Math.random() > 0.8) {
                TelemetryState.ping = Math.floor(Math.random() * 20) + 5;
                els.ping.innerText = TelemetryState.ping + ' ms';
            }

            requestAnimationFrame(updateTelemetry);
        }

        // Start simulation
        requestAnimationFrame(updateTelemetry);

        // --- UI INTERACTION ---
        const toggleBtn = document.getElementById('toggle-btn');
        const body = document.body;

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('minimal');
            const isMinimal = body.classList.contains('minimal');
            toggleBtn.innerText = isMinimal ? '[ SHOW HUD ]' : '[ TELEMETRY ]';
        });

    </script>

<script id="globe-interact">
(function(){
    // ---------- CONFIG ----------
    const CARD_WIDTH = 300;
    const ANIMATION_DURATION = 1400; // globe fly-to duration
    const SPRING_FACTOR = 0.08;
    const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const PALETTE = {
        bg: 'rgba(5,6,10,.55)',
        cyan: '#00F2FF',
        yellow: '#FFD600',
        red: '#FF003C'
    };
    // ---------- STYLE ----------
    const style = document.createElement('style');
    style.textContent = `
    .node-card{
        position:fixed;
        top:50%;
        right:20px;
        width:${CARD_WIDTH}px;
        max-width:90vw;
        padding:20px;
        transform:translateY(-50%) translateX(40px);
        opacity:0;
        background:${PALETTE.bg};
        backdrop-filter:blur(14px) saturate(1.2);
        border:1px solid rgba(0,242,255,.4);
        border-radius:14px;
        color:#fff;
        font-family:monospace;
        z-index:1000;
        transition:transform .6s cubic-bezier(0.34,1.56,0.64,1),opacity .6s cubic-bezier(0.34,1.56,0.64,1);
        will-change:transform,opacity;
        box-sizing:border-box;
        overflow:hidden;
    }
    .node-card.show{
        transform:translateY(-50%) translateX(0);
        opacity:1;
    }
    .node-card h2{
        margin:0 0 .8rem 0;
        font-size:1.4rem;
        color:${PALETTE.cyan};
        text-align:center;
    }
    .node-card .metric{
        display:flex;
        justify-content:space-between;
        margin:6px 0;
        font-size:1rem;
    }
    .node-card .metric .label{
        color:${PALETTE.cyan};
    }
    .node-card .metric .value{
        color:${PALETTE.yellow};
        min-width:60px;
        text-align:right;
    }
    .node-card .corner{
        position:absolute;
        width:24px;
        height:24px;
        fill:${PALETTE.cyan};
    }
    .node-card .corner.tl{top:-12px;left:-12px;transform:rotate(0deg);}
    .node-card .corner.tr{top:-12px;right:-12px;transform:rotate(90deg);}
    .node-card .corner.bl{bottom:-12px;left:-12px;transform:rotate(270deg);}
    .node-card .corner.br{bottom:-12px;right:-12px;transform:rotate(180deg);}
    `;
    document.head.appendChild(style);
    // ---------- CARD ----------
    const card = document.createElement('div');
    card.className = 'node-card';
    card.innerHTML = `
        <svg class="corner tl" viewBox="0 0 24 24"><path d="M0 0 L12 0 L0 12 Z"/></svg>
        <svg class="corner tr" viewBox="0 0 24 24"><path d="M0 0 L12 0 L0 12 Z"/></svg>
        <svg class="corner bl" viewBox="0 0 24 24"><path d="M0 0 L12 0 L0 12 Z"/></svg>
        <svg class="corner br" viewBox="0 0 24 24"><path d="M0 0 L12 0 L0 12 Z"/></svg>
        <h2 class="city-name"></h2>
        <div class="metric"><span class="label">Confianza</span><span class="value" data-target="0"></span></div>
        <div class="metric"><span class="label">Transacciones</span><span class="value" data-target="0"></span></div>
        <div class="metric"><span class="label">Reputación</span><span class="value" data-target="0"></span></div>
    `;
    document.body.appendChild(card);
    // ---------- UTILITIES ----------
    function hashString(str){
        let h=0;
        for(let i=0;i<str.length;i++){
            h = Math.imul(31, h) + str.charCodeAt(i) | 0;
        }
        return h>>>0; // unsigned
    }
    function deterministicMetrics(name){
        const h = hashString(name);
        const confidence = 94 + (h % 6); // 94‑99
        const transactions = 1e6 + (h % 4000000); // 1M‑5M
        const reputation = h % 101; // 0‑100
        return {confidence, transactions, reputation};
    }
    function formatNumber(val){
        if(val >= 1e6) return (val/1e6).toFixed(1)+'M';
        if(val >= 1e3) return (val/1e3).toFixed(0)+'k';
        return val.toString();
    }
    // ---------- ANIMATION ----------
    function animateValue(el, target){
        const isPercent = el.dataset.isPercent;
        let current = 0;
        function step(){
            current += (target - current) * SPRING_FACTOR;
            if(Math.abs(target - current) < 0.1){
                current = target;
                el.textContent = isPercent ? `${Math.round(current)}%` : formatNumber(Math.round(current));
                return;
            }
            el.textContent = isPercent ? `${Math.round(current)}%` : formatNumber(Math.round(current));
            requestAnimationFrame(step);
        }
        if(REDUCED_MOTION){
            el.textContent = isPercent ? `${Math.round(target)}%` : formatNumber(Math.round(target));
        }else{
            requestAnimationFrame(step);
        }
    }
    // ---------- CARD LOGIC ----------
    let cardVisible = false;
    function showCard(city){
        const nameEl = card.querySelector('.city-name');
        const metricEls = card.querySelectorAll('.metric .value');
        nameEl.textContent = city.name;
        const metrics = deterministicMetrics(city.name);
        // confidence
        metricEls[0].dataset.isPercent = 'true';
        metricEls[0].dataset.target = metrics.confidence;
        // transactions
        metricEls[1].dataset.isPercent = '';
        metricEls[1].dataset.target = metrics.transactions;
        // reputation
        metricEls[2].dataset.isPercent = 'true';
        metricEls[2].dataset.target = metrics.reputation;
        // start animations
        animateValue(metricEls[0], metrics.confidence);
        animateValue(metricEls[1], metrics.transactions);
        animateValue(metricEls[2], metrics.reputation);
        // show card
        card.classList.add('show');
        cardVisible = true;
        // stop globe auto‑rotate
        if(globe && globe.controls) globe.controls().autoRotate = false;
    }
    function hideCard(){
        card.classList.remove('show');
        cardVisible = false;
        // resume auto‑rotate after transition
        setTimeout(()=>{
            if(globe && globe.controls) globe.controls().autoRotate = true;
        },600);
    }
    // ---------- EVENT HANDLERS ----------
    function onGlobeClick(point){
        // Find city by exact lat/lng (tolerance)
        const tolerance = 0.0001;
        const city = cities.find(c=>Math.abs(c.lat-point.lat)<tolerance && Math.abs(c.lng-point.lng)<tolerance);
        if(!city) return;
        // Fly to city
        if(globe && globe.pointOfView){
            globe.pointOfView({lat:point.lat,lng:point.lng,altitude:1.6}, ANIMATION_DURATION);
        }
        // After fly‑to, show card
        setTimeout(()=>showCard(city), ANIMATION_DURATION);
    }
    function onDocumentClick(e){
        if(cardVisible && !card.contains(e.target)){
            hideCard();
        }
    }
    // ---------- ENABLE ----------
    function enable(){
        if(!globe || !globe.onPointClick) return;
        globe.onPointClick(onGlobeClick);
        document.addEventListener('click', onDocumentClick);
    }
    // ---------- EXPOSE ----------
    window.ProFixGlobeInteract = { enable };
})();
</script>

    const cfg = ROLE_CONFIGS[r];
    document.documentElement.style.setProperty('--role-color', cfg.color);
    // update star target
    starTarget = 60 + (hashString(r)%40); // 60-99
    // update title
    titleElem.textContent = `[TIER 1: ${cfg.tiers[0]}]`;
    tierIdx = 0;
    // update selector active state
    qsa('.role-chip').forEach(ch=>ch.classList.toggle('active', ch.dataset.role===r));
  }
  function getRole(){ return currentRole; }

  // ---------- Style ----------
  function injectStyle(){
    const style = document.createElement('style');
    style.textContent = `
:root{--role-color:${ROLE_CONFIGS[currentRole].color};--base-bg:${BASE_PALETTE};}
body{background:#05060a;font-family:${FONT_FAMILY};color:#fff;overflow:hidden;}
.hud-panel{border:2px solid var(--role-color);box-shadow:0 0 12px var(--role-color);transition:border-color .8s ease,box-shadow .8s ease,color .8s ease;}
${REDUCED_MOTION?'.hud-panel{transition:none;}' : ''}
.oscilloscope{position:fixed;right:20px;bottom:20px;width:260px;height:90px;background:rgba(5,6,10,.55);backdrop-filter:blur(14px);border:2px solid var(--role-color);border-radius:8px;overflow:hidden;z-index:1000;}
.star-panel{position:fixed;right:20px;top:20px;width:200px;background:rgba(5,6,10,.55);backdrop-filter:blur(12px);border:2px solid var(--role-color);border-radius:8px;padding:12px;box-sizing:border-box;color:#fff;font-size:14px;z-index:1000;}
.star-value{font-size:36px;font-weight:bold;color:var(--role-color);transition:color .4s;}
.title-overlay{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-size:18px;color:var(--role-color);text-shadow:0 0 6px var(--role-color);z-index:1000;pointer-events:none;}
.role-selector{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:1000;}
.role-chip{padding:6px 12px;background:rgba(255,255,255,.1);border:1px solid var(--role-color);border-radius:4px;color:#fff;cursor:pointer;transition:background .4s;color:var(--role-color);}
.role-chip.active{background:var(--role-color);color:#000;}
`;
    document.head.appendChild(style);
  }

  // ---------- Oscilloscope ----------
  let canvas, ctx, oscStartTime;
  function createOscilloscope(){
    canvas = document.createElement('canvas');
    canvas.className='oscilloscope';
    canvas.width=260; canvas.height=90;
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    oscStartTime = performance.now();
  }
  function drawOscilloscope(ts){
    const cfg = ROLE_CONFIGS[currentRole];
    const w = canvas.width, h = canvas.height;
    const t = (ts-oscStartTime)/1000;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--role-color').trim();
    ctx.lineWidth = 2;
    ctx.beginPath();
    const seed = hashString(cfg.wave);
    const rand = seededRandom(seed);
    for(let x=0;x<w;x++){
      const phase = x/w * Math.PI * 2;
      let y = h/2;
      // define wave composition per role
      if(currentRole==='profix'){
        y += Math.sin(phase*4 + t*3)*10;
        y += Math.sin(phase*7 + t*5)*5;
      }else if(currentRole==='procitizen'){
        y += Math.sin(phase*2 + t*2)*12;
      }else if(currentRole==='provision'){
        y += (x/w)*20 + Math.sin(phase*3 + t*4)*8;
      }else if(currentRole==='prolux'){
        y += Math.sin(phase*1.5 + t*1.5)*18;
        y += Math.sin(phase*5 + t*3)*6;
      }
      // add tiny deterministic noise
      y += (rand()-0.5)*2;
      if(x===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // ---------- Star Panel ----------
  let starElem, starValueElem;
  function createStarPanel(){
    const panel = document.createElement('div');
    panel.className='star-panel';
    panel.innerHTML = `<div class="star-label"></div><div class="star-value">0%</div><div class="star-sub"></div>`;
    document.body.appendChild(panel);
    starElem = panel;
    starValueElem = qs('.star-value',panel);
    updateStarContent();
  }
  function updateStarContent(){
    const cfg = ROLE_CONFIGS[currentRole];
    qs('.star-label',starElem).textContent = cfg.star.label;
    qs('.star-sub',starElem).textContent = cfg.star.sub;
  }
  function animateStar(){
    if(REDUCED_MOTION){ starCurrent = starTarget; }
    else{
      starCurrent += (starTarget-starCurrent)*0.08;
    }
    starValueElem.textContent = Math.round(starCurrent)+'%';
  }

  // ---------- Title Overlay ----------
  /* titleElem hoisted al top del IIFE (fix TDZ) */
  function createTitleOverlay(){
    const div = document.createElement('div');
    div.className='title-overlay';
    document.body.appendChild(div);
    titleElem = div;
  }
  function updateTitleTier(){
    const cfg = ROLE_CONFIGS[currentRole];
    const tier = cfg.tiers[tierIdx]||cfg.tiers[cfg.tiers.length-1];
    titleElem.textContent = `[TIER ${tierIdx+1}: ${tier}]`;
    titleElem.style.transition = REDUCED_MOTION?'none':'transform .6s cubic-bezier(0.34,1.56,0.64,1), opacity .6s';
    titleElem.style.transform='translateY(-12px)';
    titleElem.style.opacity='0';
    requestAnimationFrame(()=>{titleElem.style.transform='translateY(0)';titleElem.style.opacity='1';});
  }

  // ---------- Role Selector ----------
  function createRoleSelector(){
    const container = document.createElement('div');
    container.className='role-selector';
    document.body.appendChild(container);
    Object.keys(ROLE_CONFIGS).forEach(r=>{
      const chip = document.createElement('div');
      chip.className='role-chip';
      chip.dataset.role=r;
      chip.textContent=r.toUpperCase();
      chip.addEventListener('click',()=>setRole(r));
      container.appendChild(chip);
    });
  }

  // ---------- Global Click ----------
  function attachGlobalClick(){
    document.addEventListener('click',()=>{ activityCount++; if(activityCount%5===0 && tierIdx<2){ tierIdx++; updateTitleTier(); } }, {capture:true, passive:true});
  }

  // ---------- Main Loop ----------
  function startAnimationLoops(){
    function loop(ts){
      drawOscilloscope(ts);
      animateStar();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }

  // ---------- Init (al final: todas las decl ya evaluadas) ----------
  (function init(){
    const param = getUrlParam('role')||'profix';
    const role = ROLE_ALIASES[param]||param;
    injectStyle();
    createOscilloscope();
    createStarPanel();
    createTitleOverlay();
    createRoleSelector();
    attachGlobalClick();
    setRole(role);            // tras crear todo el DOM (titleElem + chips ya existen)
    startAnimationLoops();
  })();

  // ---------- Expose ----------
  window.ProFixTelemetry = {setRole, getRole};
})();

    </script>
</body>
